[workspace]
members = [".", "wasm"]
# Plain `cargo build`/`cargo test` stay native-only; the wasm crate is built
# explicitly with `wasm-pack build wasm`.
default-members = ["."]

[profile.release]
# The wasm bundle is the shipping artifact: favor download size. (Native
# release builds are rare here, and this project trades speed away happily.)
opt-level = "s"
lto = true

[package]
name = "surd"
version = "0.10.0"
edition = "2021"
description = "Surd â€” an exact-by-default computer algebra REPL (prototype)"

[lib]
name = "surd"
path = "src/lib.rs"

[[bin]]
name = "surd"
path = "src/main.rs"

[dependencies]
# Pure-Rust arbitrary-precision integers & rationals.
# Deliberately NOT `rug` (GMP/MPFR/MPC): that pulls in C + assembly and is a
# nightmare to cross-compile to wasm32. These compile to WASM cleanly, which
# matters for the eventual browser target.
num-bigint = "0.4"
num-rational = "0.4"
num-integer = "0.1"
num-traits = "0.2"

# Pure-Rust arbitrary-precision floating point WITH transcendental functions
# (sin/exp/ln/pi/â€¦). Chosen over `rug` (GMP, WASM-hostile) and `dashu` (no
# transcendentals). Drives the exactâ†’approximate boundary in `N(...)`.
# Default features off: `random` pulls randâ†’getrandom, which breaks the
# wasm32-unknown-unknown build (and we use neither random nor serde).
astro-float = { version = "0.9", default-features = false, features = ["std"] }

# Data import/export (src/dataio.rs). Function bodies serialize via derive on
# the AST; `arbitrary_precision` keeps JSON number literals as text so
# imported decimals become exact rationals instead of round-tripping
# through f64.
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["arbitrary_precision"] }

# zlib inflate for MATLAB v7 MAT-files (each variable arrives as a
# miCOMPRESSED element). Pure Rust, compiles to wasm32 cleanly; the deflate
# side builds the compressed fixtures in the importer's tests.
miniz_oxide = "0.8"

# Dev-only line editor for the REPL harness. The real frontend is the wasm/
# crate + web/ UI; this is just a pleasant way to drive the engine natively.
# Target-gated so the wasm dependency tree stays free of terminal machinery.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rustyline = "14"

[dev-dependencies]
# Property-based testing: generate random expressions/inputs and check
# algebraic invariants + that nothing ever panics, with shrinking to minimal
# failing cases.
proptest = "1"

# Benchmark harness (benches/engine.rs). Plotting/rayon features off: we only
# need timings plus `--save-baseline`/`--baseline` comparisons, and the lean
# build keeps `cargo bench` compile times down.
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "engine"
harness = false
