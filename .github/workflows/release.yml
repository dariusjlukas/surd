# Build the surd desktop app (Tauri) for macOS, Windows, and Linux and attach
# the installers to a GitHub Release.
#
# Trigger: push a tag like `v0.1.0` (or run manually). The easy path is
# `scripts/bump-version.sh <version> --tag && git push --follow-tags`, which
# keeps every manifest in step and creates the tag this workflow fires on.
#
# Flow: `verify` fails fast if the version fields disagree or the tag doesn't
# match them; each matrix runner builds the Rust engine → wasm and the Vite
# bundle (Tauri's beforeBuildCommand), compiles the desktop shell, packages the
# native installer, and uploads it to a DRAFT release; once all three finish,
# `publish` flips that draft to a public release on the repo's Releases page.
#
# Signing:
#   macOS  — OPT-IN and OFF by default, so builds are unsigned (users
#            right-click → Open past Gatekeeper) until you enable it. Tauri's
#            bundler attempts to sign whenever APPLE_CERTIFICATE is *present* —
#            even an empty string from an unset secret counts — so the signing
#            env is injected by the "Enable macOS code signing" step only when
#            the repository VARIABLE `MACOS_SIGNING` is set to `true`. To turn
#            it on: set that variable (Settings → Secrets and variables →
#            Actions → Variables) and add these secrets:
#              APPLE_CERTIFICATE           base64 of the Developer ID .p12
#              APPLE_CERTIFICATE_PASSWORD  the .p12 export password
#              APPLE_SIGNING_IDENTITY      "Developer ID Application: NAME (TEAMID)"
#              APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID   notarization
#                (APPLE_PASSWORD is an app-specific password; or swap the trio
#                 for an App Store Connect key: APPLE_API_ISSUER / APPLE_API_KEY
#                 / APPLE_API_KEY_PATH)
#   Linux  — no OS signing; a SHA256SUMS.txt of the .AppImage/.deb is attached.
#   Windows — left unsigned for now (SmartScreen warning). The CI-friendly
#            route is SignPath (free for OSS) or Azure Trusted Signing, wired
#            through bundle.windows.signCommand in tauri.conf.json. See
#            https://v2.tauri.app/distribute/sign/windows/.
name: Release desktop apps

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fail fast before the (slow) matrix build if the five version fields disagree
  # or a pushed tag doesn't match them — catches "tagged v0.2.0 but forgot to
  # bump the manifests" before three runners spend ~15 min each.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency across manifests
        run: scripts/check-version.sh
      - name: Tag matches the manifest version
        if: github.ref_type == 'tag'
        run: |
          VERSION=$(grep -m1 '"version"' app/src-tauri/tauri.conf.json \
            | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          if [ "${{ github.ref_name }}" != "v${VERSION}" ]; then
            echo "::error::tag ${{ github.ref_name }} != manifest v${VERSION}. Bump with scripts/bump-version.sh." >&2
            exit 1
          fi

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal (Intel + Apple Silicon) macOS bundle.
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown
            args: '--target universal-apple-darwin'
          # Explicit bundle list so the Fedora .rpm is always produced
          # alongside the .deb and .AppImage (Tauri builds RPMs natively, no
          # rpmbuild needed).
          - platform: ubuntu-22.04
            rust-targets: wasm32-unknown-unknown
            args: '--bundles deb,rpm,appimage'
          - platform: windows-latest
            rust-targets: wasm32-unknown-unknown
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux webview + bundler system dependencies (Tauri v2 needs the
      # webkit2gtk 4.1 line; the rest are for AppImage/.deb packaging).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './app/src-tauri -> target'

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      # macOS signing is opt-in (see header). Runs only when the MACOS_SIGNING
      # repository variable is "true", injecting the APPLE_* signing env into
      # $GITHUB_ENV for the build step below. When it doesn't run those vars
      # stay absent, so Tauri's bundler skips signing and the build stays
      # green. Secrets are read via renamed inputs so APPLE_CERTIFICATE is
      # never itself defined during this step.
      - name: Enable macOS code signing
        if: matrix.platform == 'macos-latest' && vars.MACOS_SIGNING == 'true'
        shell: bash
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          A_ID: ${{ secrets.APPLE_ID }}
          A_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          A_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$CERT" ]; then
            echo "::error::MACOS_SIGNING is true but the APPLE_CERTIFICATE secret is empty." >&2
            exit 1
          fi
          {
            echo "APPLE_CERTIFICATE<<__P12__"
            echo "$CERT"
            echo "__P12__"
            echo "APPLE_CERTIFICATE_PASSWORD=$CERT_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$IDENTITY"
            echo "APPLE_ID=$A_ID"
            echo "APPLE_PASSWORD=$A_PASSWORD"
            echo "APPLE_TEAM_ID=$A_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          # On a tag build, use the tag; on manual runs, derive from the app
          # version. tauri-action expands __VERSION__ from tauri.conf.json.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: 'surd v__VERSION__'
          releaseBody: 'Offline desktop builds of surd. Linux/Windows builds are unsigned — verify Linux downloads against SHA256SUMS.txt.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Attach checksums of the Linux bundles so downloads can be verified
      # (Linux has no OS signing gate). Runs after tauri-action has created the
      # draft release and uploaded the .AppImage/.deb on this same runner.
      - name: Publish Linux checksums
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        working-directory: app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="v${VERSION}"
          cd src-tauri/target/release/bundle
          shopt -s nullglob
          files=(appimage/*.AppImage deb/*.deb rpm/*.rpm)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no Linux bundles found to checksum" >&2
            exit 1
          fi
          # Hash with bare filenames (no dir prefix) so `sha256sum -c` works
          # against the flat assets people download from the release.
          : > SHA256SUMS.txt
          for f in "${files[@]}"; do
            ( cd "$(dirname "$f")" && sha256sum "$(basename "$f")" ) >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt
          gh release upload "$TAG" SHA256SUMS.txt --clobber

  # Every matrix leg uploads to a DRAFT release (so the public release is never
  # seen half-built, and the Linux checksums land before anyone downloads).
  # After all three platforms finish, flip the draft to a published release —
  # this is the step that makes it appear on the repo's Releases page and marks
  # it "Latest".
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(grep -m1 '"version"' app/src-tauri/tauri.conf.json \
              | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
            TAG="v${VERSION}"
          fi
          echo "Publishing release $TAG"
          gh release edit "$TAG" --draft=false --latest
