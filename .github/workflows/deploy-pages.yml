# Build the Surd web app (Rust engine → wasm, then Vite bundle) and publish
# app/dist to GitHub Pages on every push to main.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight production deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm engine
        run: wasm-pack build wasm --target web --out-dir ../app/src/engine/pkg

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      # Deploy gate: never publish a wasm bundle the substrate smoke test
      # rejects — the astro-float wasm32 bug class is invisible to the
      # native suite, so this is the last line of defense.
      - name: Build wasm engine (web REPL bundle, for the smoke gate)
        run: wasm-pack build wasm --target web --out-dir ../web/pkg

      - name: Smoke-test the wasm substrate
        run: node smoke.mjs
        working-directory: web

      - name: Build app
        # Project Pages serve from /<repo>/, so the bundle needs that base path.
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: app

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build docs (served at /<repo>/docs/)
        run: |
          pip install mkdocs-material
          mkdocs build --strict --site-dir app/dist/docs

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
