<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>exact — a correct-by-default mathematical scratchpad</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  :root {
    --bg: #1e2128; --panel: #262a33; --text: #d8dee9; --dim: #9aa3b2;
    --accent: #88c0d0; --error: #bf616a; --border: #3b4252;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 16px; margin: 0; color: var(--accent); }
  header .tagline { color: var(--dim); font-size: 12px; flex: 1; }
  header button {
    background: none; border: 1px solid var(--border); color: var(--dim);
    border-radius: 4px; padding: 2px 10px; font: inherit; font-size: 12px; cursor: pointer;
  }
  header button:hover { color: var(--text); border-color: var(--dim); }
  #history { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .entry { margin-bottom: 14px; }
  .echo {
    margin: 0; color: var(--dim); white-space: pre-wrap;
  }
  .echo::before { content: ">> "; color: var(--accent); }
  .output { padding: 2px 0 0 22px; overflow-x: auto; }
  .output.error { color: var(--error); }
  .output.running { color: var(--dim); }
  .output .katex-display { margin: 4px 0; text-align: left; }
  .note { color: var(--dim); font-size: 12px; margin-bottom: 12px; }
  .plot-label { margin: 4px 0; }
  .plot canvas { background: var(--panel); border-radius: 6px; margin-top: 4px; max-width: 100%; }
  footer {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 16px; border-top: 1px solid var(--border);
  }
  #prompt { color: var(--accent); }
  #input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font: inherit;
  }
  #status { color: var(--dim); font-size: 12px; }
  #cancel {
    display: none; background: var(--error); color: var(--bg);
    border: none; border-radius: 4px; padding: 2px 10px; font: inherit;
    font-size: 12px; cursor: pointer;
  }
</style>
</head>
<body>
<header>
  <h1>exact</h1>
  <span class="tagline">exact by default — <code>:=</code> assigns, <code>N(x)</code> goes numeric, <code>plot(sin(x), x, -pi, pi)</code> draws</span>
  <button id="clear">clear workspace</button>
</header>
<div id="history"></div>
<footer>
  <span id="prompt">&gt;&gt;</span>
  <input id="input" autocomplete="off" spellcheck="false" autofocus>
  <button id="cancel">cancel</button>
  <span id="status">loading…</span>
</footer>
<script type="module" src="./main.js"></script>
</body>
</html>
